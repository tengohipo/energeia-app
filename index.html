<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Energeia">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Energeia — Energy Drink Tracker</title>
<style>
  :root {
    --bg: #0a0e0a;
    --bg-card: #131a13;
    --bg-card-hover: #1a231a;
    --neon: #c6ff3a;
    --neon-dim: #8fc22a;
    --cyan: #3affe0;
    --text: #eef5ec;
    --text-dim: #8fa088;
    --border: #22301f;
    --danger: #ff5a5a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    background:
      radial-gradient(circle at 15% 0%, rgba(198,255,58,0.08), transparent 40%),
      radial-gradient(circle at 85% 15%, rgba(58,255,224,0.06), transparent 35%),
      var(--bg);
    min-height: 100vh;
  }

  #app { max-width: 560px; margin: 0 auto; padding: 20px 18px 100px; }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 22px;
    padding-top: 8px;
  }
  .brand {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.3px;
    font-style: italic;
    white-space: nowrap;
  }
  .brand span { color: var(--neon); }
  .stat-pill {
    font-size: 12px;
    color: var(--text-dim);
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 100px;
    font-weight: 600;
  }
  .stat-pill b { color: var(--neon); font-weight: 800; }

  .tabs {
    display: flex;
    gap: 6px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 18px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px 8px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s ease;
    border: none;
    background: transparent;
    font-family: inherit;
  }
  .tab.active {
    background: var(--neon);
    color: #0a0e0a;
  }

  .search-row { display: flex; gap: 8px; margin-bottom: 16px; }
  input[type="text"], input[type="search"] {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 15px;
    font-family: inherit;
  }
  input::placeholder { color: var(--text-dim); }
  input:focus { outline: none; border-color: var(--neon-dim); }

  .add-btn {
    background: var(--neon);
    color: #0a0e0a;
    border: none;
    width: 46px;
    height: 46px;
    border-radius: 12px;
    font-size: 24px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .add-btn:active { transform: scale(0.94); }

  .drink-list { display: flex; flex-direction: column; gap: 10px; }

  .drink-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .drink-card:active { transform: scale(0.985); background: var(--bg-card-hover); }

  .can-badge {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 16px;
    color: #0a0e0a;
    position: relative;
  }
  .can-badge.untried {
    background: var(--bg);
    border: 2px dashed var(--border);
    color: var(--text-dim);
  }

  .drink-info { flex: 1; min-width: 0; }
  .drink-name { font-weight: 700; font-size: 15px; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .drink-brand { font-size: 12.5px; color: var(--text-dim); }

  .drink-rating {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
    flex-shrink: 0;
  }
  .rating-score {
    font-size: 17px;
    font-weight: 800;
    color: var(--neon);
  }
  .rating-score.empty { color: var(--text-dim); font-size: 12px; font-weight: 600; }
  .stars-mini { font-size: 10px; color: var(--neon-dim); letter-spacing: 1px; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.6; }
  .empty-state p { font-size: 14px; line-height: 1.5; }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    display: none;
    align-items: flex-end;
  }
  .overlay.open { display: flex; }

  .sheet {
    background: #0f150e;
    border: 1px solid var(--border);
    border-bottom: none;
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    border-radius: 22px 22px 0 0;
    padding: 20px 18px calc(24px + env(safe-area-inset-bottom));
    max-height: 88vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin: 0 auto 16px;
  }

  .sheet-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
  .sheet-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }

  .field-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 8px;
    margin-top: 18px;
    display: block;
  }
  .field-label:first-of-type { margin-top: 0; }

  textarea {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    min-height: 70px;
  }
  textarea:focus, input:focus { outline: none; border-color: var(--neon-dim); }

  .star-picker { display: flex; gap: 8px; justify-content: center; padding: 8px 0; }
  .star-picker .star {
    font-size: 36px;
    cursor: pointer;
    color: var(--border);
    transition: transform 0.1s ease;
  }
  .star-picker .star.filled { color: var(--neon); }
  .star-picker .star:active { transform: scale(1.2); }

  .tried-toggle {
    display: flex;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
  }
  .tried-toggle button {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-weight: 700;
    font-size: 13px;
    border-radius: 9px;
    font-family: inherit;
    cursor: pointer;
  }
  .tried-toggle button.active { background: var(--neon); color: #0a0e0a; }

  .sheet-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-primary { background: var(--neon); color: #0a0e0a; }
  .btn-primary:active { opacity: 0.85; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }

  .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-dot {
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent;
  }
  .color-dot.selected { border-color: var(--text); transform: scale(1.1); }

  ::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="brand">ENERG<span>EIA</span></div>
    <div class="stat-pill"><b id="triedCount">0</b> tried</div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="all">All</button>
    <button class="tab" data-tab="tried">Tried</button>
    <button class="tab" data-tab="untried">Not Yet</button>
  </div>

  <div class="search-row">
    <input type="search" id="searchInput" placeholder="Search brand or name...">
    <button class="add-btn" id="openAddBtn">+</button>
  </div>

  <div class="drink-list" id="drinkList"></div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">Add a Drink</div>
    <div class="sheet-sub" id="sheetSub">Log a new energy drink to your list</div>

    <label class="field-label">Brand</label>
    <input type="text" id="inputBrand" placeholder="e.g. Monster, Red Bull, Celsius">

    <label class="field-label">Flavor / Name</label>
    <input type="text" id="inputName" placeholder="e.g. Ultra Zero, Original">

    <label class="field-label">Can Color</label>
    <div class="color-picker" id="colorPicker"></div>

    <label class="field-label">Status</label>
    <div class="tried-toggle">
      <button id="toggleUntried" class="active">Not Tried</button>
      <button id="toggleTried">Tried</button>
    </div>

    <div id="ratingSection" style="display:none;">
      <label class="field-label">Your Rating</label>
      <div class="star-picker" id="starPicker">
        <span class="star" data-val="1">★</span>
        <span class="star" data-val="2">★</span>
        <span class="star" data-val="3">★</span>
        <span class="star" data-val="4">★</span>
        <span class="star" data-val="5">★</span>
      </div>

      <label class="field-label">Notes</label>
      <textarea id="inputNotes" placeholder="Taste, aftertaste, would you buy again..."></textarea>
    </div>

    <div class="sheet-actions">
      <button class="btn btn-ghost" id="cancelBtn">Cancel</button>
      <button class="btn btn-primary" id="saveBtn">Save</button>
    </div>
    <div class="sheet-actions" id="deleteRow" style="display:none;">
      <button class="btn btn-danger" id="deleteBtn">Delete Drink</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'energeia_drinks_v1';
  const CAN_COLORS = ['#c6ff3a', '#3affe0', '#ff5a5a', '#ff9f3a', '#a855f7', '#3a8fff', '#ff3ac2', '#8fa088'];

  const DEFAULT_DRINKS = [
    { brand: 'Monster', name: 'Original', color: '#c6ff3a', tried: false, rating: 0, notes: '' },
    { brand: 'Monster', name: 'Ultra Zero', color: '#8fa088', tried: false, rating: 0, notes: '' },
    { brand: 'Red Bull', name: 'Original', color: '#3a8fff', tried: false, rating: 0, notes: '' },
    { brand: 'Red Bull', name: 'Sugar Free', color: '#a855f7', tried: false, rating: 0, notes: '' },
    { brand: 'Celsius', name: 'Sparkling Orange', color: '#ff9f3a', tried: false, rating: 0, notes: '' },
    { brand: 'Bang', name: 'Blue Razz', color: '#3affe0', tried: false, rating: 0, notes: '' },
    { brand: 'Reign', name: 'Melon Mania', color: '#ff5a5a', tried: false, rating: 0, notes: '' },
    { brand: 'Ghost', name: 'Warheads Sour Watermelon', color: '#ff3ac2', tried: false, rating: 0, notes: '' },
  ];

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    const seeded = DEFAULT_DRINKS.map((d,i) => ({ ...d, id: 'seed_' + i }));
    save(seeded);
    return seeded;
  }
  function save(drinks) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(drinks));
  }

  let drinks = load();
  let activeTab = 'all';
  let searchQuery = '';
  let editingId = null;
  let selectedColor = CAN_COLORS[0];
  let selectedRating = 0;
  let isTriedState = false;

  const drinkListEl = document.getElementById('drinkList');
  const triedCountEl = document.getElementById('triedCount');
  const overlay = document.getElementById('overlay');
  const colorPicker = document.getElementById('colorPicker');

  CAN_COLORS.forEach(c => {
    const dot = document.createElement('div');
    dot.className = 'color-dot';
    dot.style.background = c;
    dot.dataset.color = c;
    dot.onclick = () => {
      selectedColor = c;
      renderColorPicker();
    };
    colorPicker.appendChild(dot);
  });
  function renderColorPicker() {
    [...colorPicker.children].forEach(dot => {
      dot.classList.toggle('selected', dot.dataset.color === selectedColor);
    });
  }

  function render() {
    let list = drinks.filter(d => {
      if (activeTab === 'tried' && !d.tried) return false;
      if (activeTab === 'untried' && d.tried) return false;
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        if (!d.brand.toLowerCase().includes(q) && !d.name.toLowerCase().includes(q)) return false;
      }
      return true;
    });

    triedCountEl.textContent = drinks.filter(d => d.tried).length;

    if (list.length === 0) {
      drinkListEl.innerHTML = `<div class="empty-state">
        <div class="icon">⚡</div>
        <p>${searchQuery ? 'No drinks match your search.' : 'No drinks here yet. Tap + to add one.'}</p>
      </div>`;
      return;
    }

    drinkListEl.innerHTML = list.map(d => {
      const badgeContent = d.tried ? '' : '?';
      const badgeStyle = d.tried ? `background:${d.color}` : '';
      const badgeClass = d.tried ? 'can-badge' : 'can-badge untried';
      let ratingHtml;
      if (d.tried && d.rating > 0) {
        ratingHtml = `<div class="rating-score">${d.rating}.0</div><div class="stars-mini">${'★'.repeat(d.rating)}${'☆'.repeat(5-d.rating)}</div>`;
      } else if (d.tried) {
        ratingHtml = `<div class="rating-score empty">Unrated</div>`;
      } else {
        ratingHtml = `<div class="rating-score empty">—</div>`;
      }
      return `<div class="drink-card" data-id="${d.id}">
        <div class="${badgeClass}" style="${badgeStyle}">${badgeContent}</div>
        <div class="drink-info">
          <div class="drink-name">${escapeHtml(d.name)}</div>
          <div class="drink-brand">${escapeHtml(d.brand)}</div>
        </div>
        <div class="drink-rating">${ratingHtml}</div>
      </div>`;
    }).join('');

    [...drinkListEl.children].forEach(card => {
      card.onclick = () => openEdit(card.dataset.id);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeTab = tab.dataset.tab;
      render();
    };
  });

  document.getElementById('searchInput').oninput = (e) => {
    searchQuery = e.target.value;
    render();
  };

  function openAdd() {
    editingId = null;
    document.getElementById('sheetTitle').textContent = 'Add a Drink';
    document.getElementById('sheetSub').textContent = 'Log a new energy drink to your list';
    document.getElementById('inputBrand').value = '';
    document.getElementById('inputName').value = '';
    document.getElementById('inputNotes').value = '';
    selectedColor = CAN_COLORS[Math.floor(Math.random()*CAN_COLORS.length)];
    selectedRating = 0;
    isTriedState = false;
    document.getElementById('deleteRow').style.display = 'none';
    renderColorPicker();
    updateTriedToggle();
    updateStars();
    overlay.classList.add('open');
  }

  function openEdit(id) {
    const d = drinks.find(x => x.id === id);
    if (!d) return;
    editingId = id;
    document.getElementById('sheetTitle').textContent = 'Edit Drink';
    document.getElementById('sheetSub').textContent = d.brand + ' — ' + d.name;
    document.getElementById('inputBrand').value = d.brand;
    document.getElementById('inputName').value = d.name;
    document.getElementById('inputNotes').value = d.notes || '';
    selectedColor = d.color;
    selectedRating = d.rating || 0;
    isTriedState = d.tried;
    document.getElementById('deleteRow').style.display = 'flex';
    renderColorPicker();
    updateTriedToggle();
    updateStars();
    overlay.classList.add('open');
  }

  function closeSheet() {
    overlay.classList.remove('open');
  }

  document.getElementById('openAddBtn').onclick = openAdd;
  document.getElementById('cancelBtn').onclick = closeSheet;
  overlay.onclick = (e) => { if (e.target === overlay) closeSheet(); };

  function updateTriedToggle() {
    document.getElementById('toggleTried').classList.toggle('active', isTriedState);
    document.getElementById('toggleUntried').classList.toggle('active', !isTriedState);
    document.getElementById('ratingSection').style.display = isTriedState ? 'block' : 'none';
  }
  document.getElementById('toggleTried').onclick = () => { isTriedState = true; updateTriedToggle(); };
  document.getElementById('toggleUntried').onclick = () => { isTriedState = false; updateTriedToggle(); };

  function updateStars() {
    document.querySelectorAll('#starPicker .star').forEach(star => {
      star.classList.toggle('filled', parseInt(star.dataset.val) <= selectedRating);
    });
  }
  document.querySelectorAll('#starPicker .star').forEach(star => {
    star.onclick = () => {
      selectedRating = parseInt(star.dataset.val);
      updateStars();
    };
  });

  document.getElementById('saveBtn').onclick = () => {
    const brand = document.getElementById('inputBrand').value.trim();
    const name = document.getElementById('inputName').value.trim();
    const notes = document.getElementById('inputNotes').value.trim();

    if (!brand || !name) {
      alert('Please enter both a brand and a flavor/name.');
      return;
    }

    if (editingId) {
      const d = drinks.find(x => x.id === editingId);
      d.brand = brand; d.name = name; d.notes = notes;
      d.color = selectedColor; d.tried = isTriedState;
      d.rating = isTriedState ? selectedRating : 0;
    } else {
      drinks.push({
        id: 'd_' + Date.now(),
        brand, name, notes,
        color: selectedColor,
        tried: isTriedState,
        rating: isTriedState ? selectedRating : 0
      });
    }
    save(drinks);
    closeSheet();
    render();
  };

  document.getElementById('deleteBtn').onclick = () => {
    if (!editingId) return;
    if (confirm('Delete this drink from your list?')) {
      drinks = drinks.filter(x => x.id !== editingId);
      save(drinks);
      closeSheet();
      render();
    }
  };

  render();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>

</body>
</html>
